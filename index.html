<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Health-Moo — ไทยบ้าน Prototype</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;400;500;600;700&family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=Charmonman:wght@400;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    /* ไทยบ้าน — cream paper palette */
    --paper:        #f4ead7;
    --paper-2:      #ede0c4;
    --paper-3:      #e3d4b3;
    --ink:          #2a1f17;
    --ink-soft:     #5a4a3a;
    --ink-faint:    #8a7a66;
    --brick:        #b3503a;
    --brick-deep:   #8a3a28;
    --turmeric:     #d49a3a;
    --leaf:         #5a7a3e;
    --leaf-deep:    #3f5a28;
    --indigo:       #3a4f7a;     /* mor-hom indigo */
    --rose:         #c98a8a;
    --line:         rgba(42,31,23,0.18);
    --line-strong:  rgba(42,31,23,0.45);
    --shadow:       0 1px 0 rgba(42,31,23,0.06), 0 8px 20px -10px rgba(42,31,23,0.25);
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #1d1814;
    color: var(--ink);
    font-family: 'IBM Plex Sans Thai', 'Mitr', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
  }

  /* Stage — woven backdrop */
  .stage {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    box-sizing: border-box;
    background:
      radial-gradient(circle at 20% 10%, rgba(212,154,58,0.10), transparent 50%),
      radial-gradient(circle at 80% 90%, rgba(90,122,62,0.10), transparent 50%),
      repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 2px, transparent 2px 6px),
      #1d1814;
  }

  /* Pinned label card (designer notes) */
  .stage-label {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 100;
    background: var(--paper);
    color: var(--ink);
    padding: 8px 12px;
    border-radius: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    box-shadow: var(--shadow);
    border: 1px solid var(--line);
    max-width: 260px;
    line-height: 1.5;
  }
  .stage-label b { color: var(--brick); }

  /* Flow map button */
  .flow-btn {
    position: fixed;
    bottom: 20px;
    left: 20px;
    z-index: 90;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--line);
    padding: 10px 16px;
    border-radius: 999px;
    font-family: 'IBM Plex Sans Thai', sans-serif;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .flow-btn:hover { background: var(--paper-2); }

  /* Flow Map overlay */
  .flow-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,12,8,0.84);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 24px;
    overflow-y: auto;
  }
  .flow-overlay h2 {
    color: var(--paper);
    font-family: 'Mitr', sans-serif;
    font-weight: 500;
    font-size: 22px;
    margin: 0 0 6px;
    letter-spacing: 0.02em;
  }
  .flow-overlay p.sub {
    color: rgba(244,234,215,0.6);
    font-size: 13px;
    margin: 0 0 28px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .flow-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 200px));
    gap: 28px 32px;
    max-width: 1200px;
    width: 100%;
    justify-content: center;
  }
  .flow-thumb {
    background: var(--paper);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.18s ease;
    border: 1px solid var(--line);
    position: relative;
  }
  .flow-thumb:hover { transform: translateY(-3px); }
  .flow-thumb .scene { aspect-ratio: 9/19; transform: scale(0.42); transform-origin: top left; width: 480px; pointer-events: none; }
  .flow-thumb .scene-wrap { aspect-ratio: 9/19; overflow: hidden; }
  .flow-thumb .label {
    padding: 10px 14px;
    background: var(--paper-2);
    border-top: 1px solid var(--line);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .flow-thumb .label b { color: var(--brick); font-weight: 600; }
  .flow-close {
    position: fixed;
    top: 20px;
    right: 24px;
    background: transparent;
    border: 1px solid rgba(244,234,215,0.3);
    color: var(--paper);
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
  }

  /* Paper texture for screens */
  .paper-bg {
    background:
      radial-gradient(circle at 10% 0%, rgba(212,154,58,0.10), transparent 40%),
      radial-gradient(circle at 90% 100%, rgba(179,80,58,0.08), transparent 50%),
      var(--paper);
    position: relative;
  }
  .paper-bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, rgba(42,31,23,0.025) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(90deg, rgba(42,31,23,0.025) 0 1px, transparent 1px 4px);
    pointer-events: none;
    opacity: 0.7;
  }

  /* Hand-drawn dashed border */
  .stitched {
    border: 1.5px dashed var(--line-strong);
    border-radius: 18px;
  }

  /* Buttons */
  button { font-family: inherit; }

  /* Hide scrollbars inside the screen */
  .screen-scroll::-webkit-scrollbar { width: 0; }
  .screen-scroll { scrollbar-width: none; }

  /* Mascot wobble */
  @keyframes wobble {
    0%, 100% { transform: rotate(-2deg) translateY(0); }
    50%      { transform: rotate(2deg)  translateY(-4px); }
  }
  .moo-wobble { animation: wobble 3.4s ease-in-out infinite; transform-origin: 50% 80%; }

  @keyframes pulse-soft {
    0%, 100% { opacity: 0.55; transform: scale(1); }
    50%      { opacity: 1;    transform: scale(1.08); }
  }
  .pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  @keyframes float-up {
    0%   { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .float-up { animation: float-up 0.5s ease-out backwards; }

  @keyframes confetti {
    0%   { transform: translate(0,0) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--cx,0px), var(--cy,80px)) rotate(var(--cr,360deg)); opacity: 0; }
  }

  @keyframes hp-fill {
    from { width: 0%; }
    to   { width: var(--hp-target, 70%); }
  }

  @keyframes shimmer-glow {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(212,154,58,0.3); }
    50% { box-shadow: 0 0 40px rgba(212,154,58,0.6), 0 0 60px rgba(212,154,58,0.3); }
  }

  .shimmer-effect {
    background: linear-gradient(90deg, transparent, rgba(212,154,58,0.4), transparent);
    background-size: 200% 100%;
    animation: shimmer-glow 2s ease-in-out infinite;
  }

  .glow-pulse {
    animation: pulse-glow 2s ease-in-out infinite;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="screens-v2.jsx"></script>
  <script type="text/babel" src="screens-v3.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
